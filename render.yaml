services:
  - type: web
    name: cosmos-chat
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cosmos-chat-db
          property: connectionString

databases:
  - name: cosmos-chat-db
    databaseName: cosmos_chat
    user: cosmos_user
